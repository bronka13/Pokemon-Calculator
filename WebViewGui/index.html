<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Main</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <div class="battle-scene">
        <div class="container-tar">
            <div id="infoTar" class="info-box">
                <div class="hp-bar-container">
                    <div id="hpFillTar" class="hp-fill" style="width: 100%"></div>
                </div>
                <div id="hpTextTar" class="hp-text">100%</div>
            </div>
            <div class="sprite-box">
                <img id="tarSprite" class="sprite" src="">
            </div>
        </div>

        <div class="container-me">
            <div class="sprite-box">
                <img id="meSprite" class="sprite" src="">
            </div>
            <div id="infoMe" class="info-box">Me / HP</div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="control-group">
            <label>Game:</label>
            <select id="guiGame" onchange="updateGame(this.value)">
                <option value="" disabled selected hidden>Select a Game...</option>
                <option value="red">Red</option>
                <option value="blue">Blue</option>
                <option value="yellow">Yellow</option>
                <option value="gold">Gold</option>
                <option value="silver">Silver</option>
                <option value="crystal">Crystal</option>
                <option value="ruby">Ruby</option>
                <option value="sapphire">Sappphire</option>
                <option value="emerald">Emerald</option>
                <option value="firered">FireRed</option>
                <option value="leafgreen">LeafGreen</option>
                <!-- <option value="colosseum">Colosseum</option>
                <option value="xd">XD: Gale of Darkness</option> -->
                <option value="diamond">Diamond</option>
                <option value="pearl">Pearl</option>
                <option value="platinum">Platinum</option>
                <option value="heartgold">HeartGold</option>
                <option value="soulsilver">SoulSilver</option>
                <option value="black">Black</option>
                <option value="white">White</option>
                <option value="black-2">Black 2</option>
                <option value="white-2">White 2</option>
                <option value="x">X</option>
                <option value="y">Y</option>
                <option value="omega-ruby">OmegaRuby</option>
                <option value="alpha-sapphire">AlphaSapphire</option>
                <option value="sun">Sun</option>
                <option value="moon">Moon</option>
                <option value="ultra-sun">Ultra Sun</option>
                <option value="ultra-moon">Ultra Moon</option>
            </select>
        </div>

        <div class="control-group">
            <label>Target:</label>
            <input list="targetOptions" id="guiTarget" onchange="targetChanged(this.value)" placeholder="Define target">
            <datalist id="targetOptions"></datalist>
        </div>

        <div class="control-group">
            <label>Current HP:</label>
            <input type="range" id="hpSlider" min="1" max="100" value="100" oninput="updateHPVisual(this.value)">
        </div>

        <div class="control-group">
            <label>Ball</label>
            <select id="guiBall">
                <option value="">Select a Game first...</option>
            </select>
        </div>

        <button onclick="RunThrow()">Throw</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
